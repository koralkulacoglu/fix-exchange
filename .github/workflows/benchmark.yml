name: Benchmark

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.tag_check.outputs.is_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check for new release tag
        id: tag_check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
          elif git describe --tags --exact-match HEAD 2>/dev/null; then
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "No new release tag at HEAD — skipping benchmark"
          fi

  start:
    needs: check
    if: needs.check.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Start EC2 instance
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws ec2 wait instance-stopped --instance-ids ${{ secrets.BENCHMARK_INSTANCE_ID }} --region us-east-1 || true
          aws ec2 start-instances --instance-ids ${{ secrets.BENCHMARK_INSTANCE_ID }} --region us-east-1
          aws ec2 wait instance-status-ok --instance-ids ${{ secrets.BENCHMARK_INSTANCE_ID }} --region us-east-1
          sleep 15

  benchmark:
    needs: start
    runs-on: [self-hosted, aws-metal]
    steps:
      - name: Clean root-owned workspace leftovers
        run: sudo rm -rf log/ store/

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python venv
        run: |
          if [ ! -d .venv ]; then
            python3 -m venv .venv
          fi
          . .venv/bin/activate
          pip install -r requirements.txt matplotlib numpy -q

      - name: Build (Release)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS='-march=native'
          cmake --build build -j$(nproc)

      - name: Run benchmark
        run: |
          sudo chrt -f 99 -p $$
          .venv/bin/python3 bench/bench.py --save

      - name: Generate charts
        run: |
          . .venv/bin/activate
          python3 bench/plot_history.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bench/results.db bench/bench_results/
          TAG=$(git describe --tags --always)
          git diff --cached --quiet || git commit -m "chore: benchmark results for ${TAG}"
          git push origin main

      - name: Stop instance
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws ec2 stop-instances --instance-ids ${{ secrets.BENCHMARK_INSTANCE_ID }} --region us-east-1
